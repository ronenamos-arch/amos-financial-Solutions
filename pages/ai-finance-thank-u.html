      border: none;
      background: linear-gradient(135deg, #22c55e, #0ea5e9);

      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.25);
    }

    .support {
      margin-top: 32px;
      font-size: 0.85rem;
      text-align: center;
      color: #9ca3af;
    }

    .support a {
